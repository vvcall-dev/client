name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "release"
          workspaces: "."
          shared-key: "windows-release"

      - name: Build Release
        run: cargo build --release

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename binary for release
        shell: bash
        run: |
          cp target/release/vvcall.exe target/release/vvcall-windows.exe
          cp target/release/vvcall.exe target/release/p2p-voice-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') || contains(github.ref, 'alpha') }}
          files: |
              target/release/vvcall-windows.exe
              target/release/p2p-voice-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest

    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            cmake \
            build-essential \
            libssl-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "release"
          workspaces: "."
          shared-key: "linux-release"

      - name: Build
        run: cargo build --release

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename binary for release
        shell: bash
        run: |
            cp target/release/vvcall target/release/vvcall-linux
            cp target/release/vvcall target/release/p2p-voice-linux

      - name: Upload Linux Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') || contains(github.ref, 'alpha') }}
          files: |
              target/release/vvcall-linux
              target/release/p2p-voice-linux
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvcall-linux
          path: target/release/vvcall-linux

  build-macos:
      name: Build macOS Release
      runs-on: macos-latest

      env:
        CMAKE_POLICY_VERSION_MINIMUM: 3.5

      strategy:
        matrix:
          target: [aarch64-apple-darwin, x86_64-apple-darwin]

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable
          with:
            toolchain: stable
            targets: ${{ matrix.target }}

        - name: Rust Cache
          uses: Swatinem/rust-cache@v2
          with:
            cache-targets: "release"
            workspaces: "."
            shared-key: "macos-release-${{ matrix.target }}"

        - name: Build Release
          run: cargo build --release --target ${{ matrix.target }}

        - name: Get version from tag
          id: get_version
          shell: bash
          run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

        - name: Rename binary for release
          shell: bash
          run: |
            SUFFIX=$([[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]] && echo "arm64" || echo "x86_64")
            cp target/${{ matrix.target }}/release/vvcall target/${{ matrix.target }}/release/vvcall-macos-$SUFFIX
            cp target/${{ matrix.target }}/release/vvcall target/${{ matrix.target }}/release/p2p-voice-macos-$SUFFIX

        - name: Create Release
          uses: softprops/action-gh-release@v2
          with:
            name: Release ${{ steps.get_version.outputs.VERSION }}
            draft: false
            prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') || contains(github.ref, 'alpha') }}
            files: |
              target/${{ matrix.target }}/release/vvcall-macos-arm64
              target/${{ matrix.target }}/release/vvcall-macos-x86_64
              target/${{ matrix.target }}/release/p2p-voice-macos-arm64
              target/${{ matrix.target }}/release/p2p-voice-macos-x86_64
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
